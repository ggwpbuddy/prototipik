<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ГГВП — поиск тиммейтов</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Unbounded:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pk:#FF3D7F;--pk2:#ff2d72;--pk-soft:#ff7aa6;
  --acc:#7C6CFF;--acc2:#9b8dff;
  --cy:#36E2D0;--cy-soft:#7af0e4;
  --dark:#070709;--dark2:#0B0B10;
  --card:#101017;--card2:#16161f;--card3:#1d1d28;
  --bd:#212130;--bd2:#30303f;
  --white:#F4F2F8;--muted:#9897ab;--muted2:#5a5a70;
  --green:#3DDC97;--blue:#6CA8FF;--purple:#B09CF7;--amber:#FFB454;
  --px:'VT323',monospace;
  --mono:'Inter',monospace;
  --sans:'Unbounded','Inter',sans-serif;
  --ui:'Inter',sans-serif;
  --body:'Inter',sans-serif;
  --sb:264px;
  --grad:linear-gradient(115deg,#FF3D7F 0%,#FF5C9A 38%,#9B6CFF 78%,#36E2D0 130%);
  --grad-2:linear-gradient(120deg,#FF3D7F,#7C6CFF);
  --grad-soft:linear-gradient(135deg,rgba(255,61,127,.16),rgba(124,108,255,.1));
  --glow-pk:0 0 0 1px rgba(255,61,127,.25),0 8px 30px rgba(255,61,127,.28);
}
html,body,#root{height:100%;background:var(--dark);color:var(--white);font-family:var(--body);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden;max-width:100%;position:relative;overscroll-behavior-y:none}
/* мобильный корень: фиксируем под видимую высоту экрана телефона (адресная строка не режет) */
.mobile-root{display:flex;flex-direction:column;overflow:hidden;width:100%;height:100vh;height:100dvh}
body{
  background:
    radial-gradient(1200px 760px at 88% -12%,rgba(124,108,255,.13),transparent 58%),
    radial-gradient(1000px 680px at -8% 112%,rgba(255,61,127,.11),transparent 55%),
    radial-gradient(700px 500px at 50% 120%,rgba(54,226,208,.06),transparent 60%),
    var(--dark);
  position:relative;
}
/* fine grid texture + scanlines for arcade-terminal atmosphere */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:linear-gradient(rgba(124,108,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(124,108,255,.035) 1px,transparent 1px);
  background-size:38px 38px;mask-image:radial-gradient(circle at 50% 35%,#000 30%,transparent 85%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.5;mix-blend-mode:overlay;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px)}
#root{position:relative;z-index:2}
/* CRT vignette for arcade depth */
body > #root::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:50;box-shadow:inset 0 0 180px 30px rgba(0,0,0,.55)}
button{cursor:pointer;font-family:var(--ui)}
input,textarea,select{font-family:var(--body);background:#0e0e15;color:var(--white);border:1px solid var(--bd);border-radius:12px;padding:11px 13px;font-size:14px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;-moz-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--pk);box-shadow:0 0 0 3px rgba(255,61,127,.14);background:#11111a}
select option{background:#0e0e15;color:var(--white)}
textarea{resize:vertical;min-height:74px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#3a3a48}
a.lnk{color:var(--cy-soft);text-decoration:none;border-bottom:1px solid rgba(122,240,228,.4);word-break:break-all}
a.lnk:hover{color:#fff;border-color:#fff}
.bub.mine a.lnk{color:#fff;border-bottom-color:rgba(255,255,255,.6)}

/* PIXEL LOGO */
/* PIXEL LOGO — uses bundled VT323 (Google Fonts) with monospace fallback */
.logo{font-family:'VT323',monospace;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:inline-block;line-height:1;text-shadow:0 0 16px rgba(255,61,127,.5),0 0 3px rgba(124,108,255,.5)}
.logo-px{display:inline-flex;gap:0;align-items:center}

/* APP SHELL */
.app-shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sb);min-width:var(--sb);background:linear-gradient(180deg,#0b0b11,#08080c);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(124,108,255,.25),transparent)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid var(--bd)}
.sb-tagline{font-family:var(--px);font-size:11px;color:var(--muted2);letter-spacing:.18em;margin-top:11px;text-transform:uppercase;line-height:1.6}
.sb-nav{flex:1;padding:16px 12px 6px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.nb{display:flex;align-items:center;gap:13px;padding:12px 14px;border:none;background:none;color:var(--muted);font-size:14.5px;font-family:var(--ui);font-weight:600;width:100%;text-align:left;cursor:pointer;transition:all .16s;border-radius:13px;position:relative;letter-spacing:.01em}
.nb-ic{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:#14141d;border:1px solid var(--bd);flex-shrink:0;transition:all .16s;color:var(--muted)}
.nb:hover .nb-ic{border-color:var(--bd2);color:var(--white)}
.nb.on .nb-ic{background:var(--grad-soft);border-color:rgba(255,61,127,.3);color:var(--pk-soft)}
.nb:hover{color:var(--white);background:#14141d}
.nb.on{color:var(--white);background:linear-gradient(100deg,rgba(255,61,127,.16),rgba(124,108,255,.08));box-shadow:inset 0 0 0 1px rgba(255,61,127,.22)}
.nb.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--grad-2);box-shadow:0 0 10px var(--pk)}
.nb-badge{background:var(--grad-2);color:#fff;font-family:var(--px);font-size:11px;border-radius:6px;padding:4px 6px;margin-left:auto;flex-shrink:0;letter-spacing:0}
.nb-dot{width:7px;height:7px;border-radius:50%;background:var(--cy);margin-left:auto;box-shadow:0 0 8px var(--cy)}
.sb-section{padding:8px 12px 4px;font-family:var(--px);font-size:12px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
.sb-online{margin:0 12px 10px;background:linear-gradient(160deg,#12121b,#0d0d13);border:1px solid var(--bd);border-radius:15px;padding:14px}
.sb-online-title{font-family:var(--px);font-size:12px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;line-height:1.5}
.sb-online-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.sb-online-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;border-radius:9px;padding:3px;margin-left:-3px;margin-right:-3px;transition:background .14s}
.sb-online-row:hover{background:#16161f}
.sb-online-row:last-child{margin-bottom:0}
.sb-online-nick{font-size:12.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-foot{padding:12px;border-top:1px solid var(--bd)}
.sf{display:flex;align-items:center;gap:11px;cursor:pointer;padding:11px;border-radius:14px;transition:all .15s;border:1px solid transparent}
.sf:hover{background:#14141d;border-color:var(--bd)}
.sf-nick{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--white)}
.sf-status{font-family:var(--px);font-size:12px;color:var(--green);letter-spacing:.04em;margin-top:5px;line-height:1.4}
/* SIDEBAR CTA */
.sb-cta{margin:10px 12px 16px;padding:16px;border-radius:16px;border:1px solid var(--bd2);background:linear-gradient(150deg,#15111f,#0e0c14);cursor:pointer;position:relative;overflow:hidden;transition:transform .16s,border-color .16s;flex-shrink:0}
.sb-cta:hover{transform:translateY(-2px);border-color:rgba(255,61,127,.35)}
.sb-cta-glow{position:absolute;top:-50%;right:-30%;width:160px;height:160px;background:radial-gradient(circle,rgba(255,61,127,.3),transparent 70%);pointer-events:none}
.sb-cta-ic{width:38px;height:38px;border-radius:11px;background:var(--grad-2);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin-bottom:12px;box-shadow:0 4px 16px rgba(255,61,127,.35)}
.sb-cta-t{font-family:var(--sans);font-weight:600;font-size:14px;color:#fff;margin-bottom:5px;letter-spacing:-.01em}
.sb-cta-s{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:13px}
.sb-cta-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--px);font-size:11px;color:var(--pk-soft);letter-spacing:.04em}

/* DESKTOP HEADER */
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.desk-hdr{display:flex;align-items:center;gap:14px;padding:18px 34px;border-bottom:1px solid var(--bd);background:rgba(11,11,16,.6);backdrop-filter:blur(10px);flex-shrink:0}
.desk-hdr-title{font-size:17px;font-weight:600;flex:1;color:var(--white);font-family:var(--sans);letter-spacing:-.01em;display:flex;align-items:center;gap:11px}
.desk-hdr-title .tdot{width:8px;height:8px;border-radius:2px;background:var(--grad-2);box-shadow:0 0 10px var(--pk);transform:rotate(45deg)}
.desk-hdr-right{display:flex;align-items:center;gap:11px}

/* CONTENT */
.content-area{flex:1;overflow-y:auto;padding:32px 34px}
.content-area.no-pad{padding:0;overflow:hidden}
.content-wrap{max-width:780px;margin:0 auto}

/* MOBILE BITS */
/* MOBILE NAV — active tab is a glowing pill with label, others icon-only */
.mnav{display:flex;align-items:center;justify-content:space-around;gap:5px;padding:9px 10px;background:rgba(11,11,16,.92);backdrop-filter:blur(14px);border-top:1px solid var(--bd);flex-shrink:0}
.mnav-i{display:flex;align-items:center;gap:8px;border:none;background:none;cursor:pointer;color:var(--muted);padding:9px 12px;border-radius:14px;transition:all .2s cubic-bezier(.3,1,.4,1);position:relative;min-height:46px}
.mnav-i:active{transform:scale(.92)}
.mnav-i.on{color:#fff;background:var(--grad-2);box-shadow:0 5px 18px rgba(255,61,127,.4);padding:9px 16px}
.mnav-ic{position:relative;display:inline-flex}
.mnav-i svg{flex-shrink:0}
.mnav-lbl{font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:-.01em;white-space:nowrap;animation:navlbl .25s ease}
@keyframes navlbl{from{opacity:0;max-width:0}to{opacity:1;max-width:90px}}
.mnav-dot{width:8px;height:8px;border-radius:50%;background:var(--cy);position:absolute;top:-2px;right:-3px;box-shadow:0 0 7px var(--cy);border:1.5px solid var(--dark2)}
.mnav-i.on .mnav-dot{background:#fff;box-shadow:none;border-color:transparent}

/* CARDS */
.card{background:linear-gradient(162deg,var(--card),#0d0d14);border:1px solid var(--bd);border-radius:18px;padding:18px;transition:border-color .16s,transform .16s,box-shadow .16s}
.card:hover{border-color:var(--bd2)}
.card2{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:14px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:var(--ui);transition:all .15s;white-space:nowrap;line-height:1;text-align:center}
.btn-p{background:var(--grad-2);color:#fff;box-shadow:0 4px 18px rgba(255,61,127,.3)}
.btn-p:hover{filter:brightness(1.08);box-shadow:0 7px 24px rgba(255,61,127,.44);transform:translateY(-1px)}
.btn-p:active{transform:translateY(0)}
.btn-p:disabled{opacity:.32;cursor:default;box-shadow:none;transform:none;filter:none}
.btn-g{background:#14141d;border:1px solid var(--bd2);color:var(--white)}
.btn-g:hover{border-color:#4a4a5a;background:#1b1b25}
.btn-d{background:transparent;border:1px solid #57212f;color:var(--pk-soft)}
.btn-d:hover{background:rgba(255,61,127,.1);border-color:var(--pk)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px}
.btn-fw{width:100%}
.btn svg{width:1.15em;height:1.15em}
.btn-sm svg{width:1.05em;height:1.05em}

/* FORM */
.fg{margin-bottom:16px}
.fl{display:block;font-family:var(--px);font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;line-height:1.5}
.fhint{font-size:12px;color:var(--muted2);margin-top:5px;line-height:1.5}

/* TAGS */
.tag{font-family:var(--mono);font-size:11px;border-radius:8px;padding:4px 10px;letter-spacing:.01em;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-weight:600}
.tg{background:rgba(108,168,255,.12);color:var(--blue);border:1px solid rgba(108,168,255,.22)}
.tg-match{background:rgba(61,220,151,.16);color:var(--green);border:1px solid rgba(61,220,151,.4);font-family:var(--mono);font-size:11px;border-radius:8px;padding:4px 10px;font-weight:700;letter-spacing:.01em;display:inline-flex;align-items:center;box-shadow:0 0 12px rgba(61,220,151,.18)}
.match-pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--green);background:rgba(61,220,151,.13);border:1px solid rgba(61,220,151,.35);padding:3px 9px;border-radius:8px}
.tr{background:rgba(255,61,127,.1);color:var(--pk-soft);border:1px solid rgba(255,61,127,.24)}
.tw{display:flex;flex-wrap:wrap;gap:6px;padding:9px;background:#0e0e15;border:1px solid var(--bd);border-radius:12px;min-height:46px;cursor:text;align-items:flex-start}
.tw:focus-within{border-color:var(--pk);box-shadow:0 0 0 3px rgba(255,61,127,.14)}
.tw input{background:none;border:none;outline:none;font-size:13px;color:var(--white);min-width:90px;flex:1;padding:3px 4px;box-shadow:none}
.tx{background:none;border:none;color:inherit;font-size:12px;padding:0 0 0 2px;cursor:pointer;opacity:.55}.tx:hover{opacity:1}

/* ROLES PICKER */
.role-pick-wrap{margin-bottom:6px}
.role-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.role-chip{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:9px;border:1px solid var(--bd2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.01em;font-weight:600}
.role-chip:hover{border-color:var(--pk);color:var(--pk-soft)}
.role-chip.sel{background:rgba(255,61,127,.12);border-color:var(--pk);color:var(--pk-soft)}

/* SECTION LABEL */
.sl{font-family:var(--px);font-size:12px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:10px;line-height:1.5}
.sl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bd),transparent)}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px}
.ph-t{font-size:18px;font-weight:600;color:var(--white);font-family:var(--sans);letter-spacing:-.01em;display:flex;align-items:center;gap:11px}
.ph-t::before{content:'';width:9px;height:9px;background:var(--grad-2);box-shadow:0 0 12px var(--pk);transform:rotate(45deg);flex-shrink:0}

/* DOTS */
.odot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 0 2px rgba(61,220,151,.18),0 0 9px rgba(61,220,151,.55)}
.fdot{width:8px;height:8px;border-radius:50%;background:#33333f;flex-shrink:0}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(4,4,8,.82);backdrop-filter:blur(9px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;animation:fade .2s ease}
.mbox{background:linear-gradient(165deg,#14141d,#0c0c12);border:1px solid #2c2c3a;border-radius:22px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 90px rgba(0,0,0,.7);position:relative}
.mbox::before{content:'';position:absolute;top:0;left:22px;right:22px;height:2px;background:var(--grad);border-radius:2px;opacity:.7}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt{font-size:16px;font-weight:600;font-family:var(--sans);letter-spacing:-.01em}
.mbox-x{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:9px;border:1px solid var(--bd2);background:#14141d;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:all .15s}
.mbox-x:hover{border-color:#4a4a5a;background:#1b1b25;color:var(--white)}

/* RADAR BARS */
.rb{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rbn{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:78px;letter-spacing:.01em;font-weight:500}
.rbt{flex:1;height:5px;background:#1d1d28;border-radius:3px;overflow:hidden}
.rbf{height:5px;border-radius:3px;transition:width .5s cubic-bezier(.3,1,.4,1)}
.rbv{font-family:var(--px);font-size:14px;min-width:16px;text-align:right}

/* SLIDERS */
.sr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.srl{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:80px;letter-spacing:.01em;font-weight:500}
.srv{font-family:var(--px);font-size:14px;min-width:16px;text-align:right}
input[type=range]{-webkit-appearance:none;height:5px;background:#1d1d28;border-radius:3px;border:none;padding:0;cursor:pointer;flex:1;min-width:0;width:100%;box-shadow:none}
input[type=range]:focus{box-shadow:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:4px;background:var(--grad-2);cursor:pointer;box-shadow:0 0 0 4px rgba(255,61,127,.18)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:4px;background:var(--pk);cursor:pointer}

/* PROFILE HERO */
.prof-hero{display:flex;align-items:center;gap:18px;padding:24px;background:linear-gradient(130deg,rgba(255,61,127,.13),rgba(124,108,255,.07) 60%,rgba(54,226,208,.05)),var(--card);border:1px solid var(--bd2);border-radius:22px;margin-bottom:16px;position:relative;overflow:hidden}
.prof-hero::after{content:'';position:absolute;top:-50%;right:-8%;width:260px;height:260px;background:radial-gradient(circle,rgba(124,108,255,.22),transparent 70%);pointer-events:none}
.prof-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:16px 16px;mask-image:linear-gradient(115deg,#000,transparent 55%);pointer-events:none}

/* AVATAR UPLOAD */
.aup{position:relative;cursor:pointer;display:inline-flex;flex-shrink:0}
.aup-ov{position:absolute;inset:0;border-radius:inherit;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;pointer-events:none;flex-direction:column;gap:4px}
.aup:hover .aup-ov,.aup:active .aup-ov{opacity:1}
.aup input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:0}

/* ONBOARDING + LOGIN */
.ob{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;position:relative}
.ob-b{background:linear-gradient(165deg,#14141d,#0b0b11);border:1px solid #2a2a36;border-radius:26px;padding:34px;width:100%;max-width:450px;box-shadow:0 30px 100px rgba(0,0,0,.6);position:relative;overflow:hidden}
.ob-b::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.ob-b::after{content:'';position:absolute;top:-30%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(124,108,255,.16),transparent 70%);pointer-events:none}
.ob-sub{font-family:var(--px);font-size:13px;color:var(--muted2);letter-spacing:.12em;margin-top:13px;margin-bottom:28px;text-transform:uppercase;line-height:1.6}
.prog{display:flex;gap:6px;margin-bottom:26px}
.ps{height:5px;border-radius:3px;background:#1d1d28;flex:1;transition:background .25s}
.ps.d{background:var(--grad-2)}

/* CHAT — layout driven by .mob class (prop), NOT viewport media query */
.chat-wrap{display:flex;height:100%;overflow:hidden;position:relative}
.chat-list{width:300px;min-width:300px;border-right:1px solid var(--bd);overflow-y:auto;background:var(--dark2);flex-shrink:0}
.chat-conv{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:radial-gradient(800px 460px at 50% 0%,rgba(124,108,255,.06),transparent 60%)}
.ci{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid #111118}
.ci:hover{background:#13131b}
.ci.on{background:linear-gradient(90deg,rgba(255,61,127,.12),transparent);box-shadow:inset 3px 0 0 var(--pk)}
.msgs-area{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:3px}
.mr{display:flex;align-items:flex-end;gap:8px;margin-top:10px}
.mr.me{flex-direction:row-reverse}
.mr.grp{margin-top:2px}
.mr-col{display:flex;flex-direction:column;max-width:72%;min-width:0}
.mr.me .mr-col{align-items:flex-end}
.bub{width:fit-content;max-width:100%;padding:9px 13px;border-radius:16px;font-size:14.5px;line-height:1.45;word-break:break-word;overflow-wrap:anywhere;position:relative}
.bub.them{background:#191922;border:1px solid #262630;border-bottom-left-radius:5px;color:var(--white)}
.bub.mine{background:var(--grad-2);color:#fff;border-bottom-right-radius:5px;box-shadow:0 3px 16px rgba(255,61,127,.26)}
.mtime{font-family:var(--mono);font-size:10px;color:var(--muted2);padding:3px 4px 0}
.bub.typing{display:inline-flex;align-items:center;gap:4px;padding:12px 14px}
.bub.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;animation:tdot 1.2s infinite}
.bub.typing .tdot2{animation-delay:.18s}
.bub.typing .tdot3{animation-delay:.36s}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.chat-inp-row{padding:14px 16px;border-top:1px solid var(--bd);display:flex;gap:9px;align-items:flex-end;background:var(--dark2);flex-shrink:0}
.chat-inp{flex:1;resize:none;min-height:44px;max-height:120px;border-radius:14px;padding:12px 14px;font-size:14.5px;line-height:1.4}
.chat-hdr{padding:13px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:11px;background:rgba(11,11,16,.72);backdrop-filter:blur(10px);flex-shrink:0}
.chat-hdr-info{min-width:0;cursor:pointer;flex:1}
.chat-hdr-info:hover .chat-hdr-name{color:var(--pk-soft)}
.chat-hdr-name{font-size:15px;font-weight:700;font-family:var(--sans);transition:color .15s}
/* MOBILE chat (driven by .mob, not media query — works inside preview frame) */
.chat-wrap.mob .chat-list{width:100%;min-width:0;position:absolute;inset:0;z-index:2;background:var(--dark);border-right:none}
.chat-wrap.mob .chat-conv{position:absolute;inset:0;z-index:3;background:var(--dark);display:none}
.chat-wrap.mob.chat-open .chat-list{display:none}
.chat-wrap.mob.chat-open .chat-conv{display:flex}
.chat-wrap.mob .mr-col{max-width:80%}

/* GACHA */
.gacha-c{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:8px 0;min-height:min(560px,calc(100vh - 220px))}
.chest-svg{transition:transform .15s;display:block;filter:drop-shadow(0 14px 46px rgba(255,61,127,.45));position:relative;z-index:2;pointer-events:none}
.lootbox-stage{position:relative;width:100%;max-width:440px;height:300px;display:flex;align-items:center;justify-content:center;border-radius:26px;overflow:hidden;border:1px solid var(--bd2);background:radial-gradient(circle at 50% 45%,#1a1426,#0d0c14 72%);cursor:pointer;padding:0;transition:transform .16s,border-color .16s,box-shadow .16s}
.lootbox-stage.open-ready:hover{transform:translateY(-3px) scale(1.01);border-color:rgba(255,61,127,.5);box-shadow:0 16px 50px rgba(255,61,127,.25)}
.lootbox-stage.open-ready:hover .chest-svg{transform:scale(1.06)}
.lootbox-stage.open-ready:active{transform:scale(.99)}
.lootbox-stage.open-ready:active .chest-svg{transform:scale(.94)}
.lootbox-stage.depleted{cursor:default;opacity:.6;filter:grayscale(.4)}
.lootbox-glow{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,61,127,.35),rgba(124,108,255,.18) 45%,transparent 70%);animation:pulseGlow 3s ease-in-out infinite}
.lootbox-ring{position:absolute;width:248px;height:248px;border-radius:50%;border:1.5px dashed rgba(124,108,255,.35);animation:spin 22s linear infinite}
.lootbox-ring::after{content:'';position:absolute;width:286px;height:286px;top:-20px;left:-20px;border-radius:50%;border:1px solid rgba(255,61,127,.18)}
.lootbox-tap{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:6px;font-family:var(--px);font-size:11px;color:var(--pk-soft);background:rgba(255,61,127,.12);border:1px solid rgba(255,61,127,.3);padding:6px 13px;border-radius:9px;white-space:nowrap;animation:pulse 2s infinite;z-index:3}
.lootbox-meta{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--card2);border:1px solid var(--bd);padding:7px 14px;border-radius:10px;font-weight:500}
.drop-tries{display:flex;gap:6px;align-items:center}
.drop-pip{width:11px;height:11px;border-radius:4px;background:#22222c;transition:all .25s}
.drop-pip.on{background:var(--grad-2);box-shadow:0 0 9px rgba(255,61,127,.5)}
.chest-svg:hover{transform:scale(1.05)}
.chest-svg:active{transform:scale(.96)}
@keyframes chestFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
/* LOOTBOX STAGE */
.lootbox-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:26px 26px;mask-image:radial-gradient(circle at 50% 50%,#000,transparent 75%)}
@keyframes pulseGlow{0%,100%{opacity:.7;transform:scale(.95)}50%{opacity:1;transform:scale(1.06)}}
@keyframes spin{to{transform:rotate(360deg)}}
.gp-dots{display:flex;gap:5px}
.gp-dot{width:9px;height:9px;border-radius:3px;transition:all .2s}
.g-actions{display:flex;gap:10px;width:100%;max-width:360px}
.g-skip{flex:1;height:54px;background:#14141d;border:1px solid var(--bd2);border-radius:15px;color:var(--muted);font-family:var(--ui);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .15s}
.g-skip:hover{border-color:var(--muted2);color:var(--white);background:#1a1a24}
.g-skip svg{width:19px;height:19px}
.g-like{flex:1.4;height:54px;background:var(--grad-2);border:none;border-radius:15px;color:#fff;font-family:var(--ui);font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .15s;box-shadow:0 6px 24px rgba(255,61,127,.34)}
.g-like svg{width:19px;height:19px}
.g-like:hover{filter:brightness(1.08);transform:translateY(-1px)}

/* TUTORIAL */
.tut-bg{position:fixed;inset:0;background:rgba(4,4,8,.93);backdrop-filter:blur(8px);z-index:700;display:flex;align-items:center;justify-content:center;padding:18px;animation:fade .2s ease}
.tut-step{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.tut-num{width:32px;height:32px;border-radius:9px;background:var(--grad-soft);border:1px solid rgba(255,61,127,.28);color:var(--pk-soft);font-family:var(--px);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tut-text{font-size:14px;color:var(--muted);line-height:1.6}
.tut-text strong{color:var(--white)}

/* NOTIF */
.notif-row{display:flex;gap:13px;align-items:flex-start;padding:15px;border:1px solid var(--bd);border-radius:16px;margin-bottom:9px;background:var(--card);transition:border-color .15s;position:relative}
.notif-row:hover{border-color:var(--bd2)}
.notif-row.unread{background:linear-gradient(90deg,rgba(255,61,127,.07),var(--card))}
.notif-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;cursor:pointer;position:relative;transition:transform .14s}
.notif-icon:hover{transform:scale(1.05)}
.notif-name{cursor:pointer;color:var(--white);font-weight:700;border-bottom:1px dashed rgba(255,255,255,.22)}
.notif-name:hover{color:var(--pk-soft);border-color:var(--pk-soft)}
.notif-x{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:8px;border:none;background:transparent;color:var(--muted2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.notif-x:hover{background:rgba(255,61,127,.12);color:var(--pk)}

/* MATCH */
.match-b{background:linear-gradient(135deg,rgba(255,61,127,.18),rgba(124,108,255,.13));border:1px solid rgba(255,61,127,.32);border-radius:16px;padding:16px;display:flex;align-items:center;gap:13px;margin-bottom:18px}

/* EMPTY */
.emp{text-align:center;padding:54px 20px;color:var(--muted2)}
.emp .emp-ic{width:68px;height:68px;border-radius:19px;background:var(--card2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin:0 auto 17px;position:relative}
.emp .emp-ic::after{content:'';position:absolute;inset:-1px;border-radius:19px;padding:1px;background:var(--grad);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.3}
.emp .emp-ic i{font-size:31px;opacity:.65}
.emp p{font-size:13.5px;letter-spacing:.01em;line-height:1.8;color:var(--muted)}

/* HERO (board landing) */
.hero{position:relative;overflow:hidden;border:1px solid var(--bd2);border-radius:22px;padding:26px 26px 24px;margin-bottom:26px;background:linear-gradient(135deg,#13101c 0%,#0e0c14 55%,#0c0e16 100%)}
.hero-glow{position:absolute;top:-60%;right:-15%;width:380px;height:380px;background:radial-gradient(circle,rgba(124,108,255,.32),rgba(255,61,127,.14) 45%,transparent 70%);pointer-events:none;animation:floaty 9s ease-in-out infinite}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:22px 22px;mask-image:radial-gradient(circle at 78% 18%,#000,transparent 72%);pointer-events:none}
.hero-kicker{display:inline-flex;align-items:center;gap:8px;font-family:var(--px);font-size:12px;letter-spacing:.04em;color:var(--pk-soft);background:rgba(255,61,127,.1);border:1px solid rgba(255,61,127,.26);padding:5px 11px;border-radius:8px;margin-bottom:16px}
.hero-live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 9px var(--green);animation:pulse 1.8s infinite}
.hero-title{font-family:var(--sans);font-weight:700;font-size:30px;line-height:1.05;letter-spacing:-.02em;color:#fff;margin-bottom:10px}
.hero-accent{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.55;max-width:430px;margin-bottom:22px}
.hero-stats{display:flex;gap:26px}
.hero-stat-v{font-family:var(--px);font-size:30px;color:#fff;line-height:1;text-shadow:0 0 16px rgba(124,108,255,.4)}
.hero-stat-l{font-family:var(--px);font-size:11px;color:var(--muted2);letter-spacing:.04em;text-transform:uppercase;margin-top:8px}
@keyframes floaty{0%,100%{transform:translate(0,0)}50%{transform:translate(-14px,14px)}}
@media(max-width:520px){.hero-title{font-size:23px}.hero-stats{gap:18px}.hero-stat-v{font-size:24px}}

/* MISC */
.badge{background:var(--grad-2);color:#fff;font-family:var(--px);font-size:12px;border-radius:6px;padding:4px 6px;flex-shrink:0;letter-spacing:0;line-height:1.4}
.timer-b{font-family:var(--mono);font-size:11px;color:var(--muted);padding:4px 10px;background:var(--card2);border:1px solid var(--bd);border-radius:9px;white-space:nowrap;font-weight:600}
.sep{height:1px;background:var(--bd);margin:18px 0}
.ae-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ae-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.ae-inp{flex:1;padding:8px 11px;font-size:13px;border-radius:9px;width:auto}
.stat-card{background:linear-gradient(160deg,var(--card2),#101017);border:1px solid var(--bd);border-radius:15px;padding:16px 17px;display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:50px;height:50px;background:radial-gradient(circle at top right,rgba(255,61,127,.14),transparent 70%)}
.stat-val{font-size:34px;font-family:var(--px);color:var(--white);line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.stat-label{font-family:var(--px);font-size:11px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* MOBILE PROFILE COMPACT — чуть плотнее, чтобы влезало без скролла */
.prof-compact .prof-hero{padding:16px;gap:14px;margin-bottom:12px}
.prof-compact .prof-hero .av-lg,.prof-compact .prof-hero>:first-child{}
.prof-compact .stat-card{padding:12px 13px;gap:4px}
.prof-compact .stat-val{font-size:27px}
.prof-compact .ph{margin-bottom:16px}
.prof-compact .card{padding:14px;margin-bottom:11px!important}
.prof-compact .sl{margin-bottom:10px}

/* PREVIEW BAR */
.pv-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:#040406;border-bottom:1px solid #13131a;flex-shrink:0}
.pv-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border:1px solid #262633;border-radius:10px;background:none;color:var(--muted2);font-family:var(--px);font-size:12px;cursor:pointer;transition:all .15s;letter-spacing:.04em}
.pv-btn:hover{border-color:#3a3a48;color:var(--muted)}
.pv-btn.on{background:var(--card2);border-color:#3a3a48;color:var(--white)}
.pv-btn i{font-size:14px}
.pv-lbl{font-family:var(--px);font-size:12px;color:var(--muted2);letter-spacing:.06em}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px) rotate(-2deg)}40%{transform:translateX(8px) rotate(2deg)}60%{transform:translateX(-5px) rotate(-1.5deg)}80%{transform:translateX(5px) rotate(1.5deg)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.fu{animation:fu .25s ease}
.pop{animation:pop .22s cubic-bezier(.3,1.4,.5,1)}

/* ════════════ МОНЕТИЗАЦИЯ: ГГВП+ / КАСТОМИЗАЦИЯ / РЕФЕРАЛКА ════════════ */
:root{
  --gold:#FFD66B;--gold2:#FFB454;
  --grad-gold:linear-gradient(120deg,#FFE49B 0%,#FFD66B 38%,#FFB454 80%,#FF9D5C 130%);
  --grad-prem:linear-gradient(125deg,#FFD66B 0%,#FF8FB7 45%,#9B6CFF 100%);
}
/* премиум-бейдж рядом с ником */
.prem-badge{display:inline-flex;align-items:center;gap:3px;font-family:var(--px);font-size:11px;font-weight:700;color:#1a1206;background:var(--grad-gold);padding:2px 7px;border-radius:7px;letter-spacing:.02em;flex-shrink:0;box-shadow:0 0 12px rgba(255,180,84,.4);line-height:1.5;vertical-align:middle}
.prem-badge.sm{font-size:9px;padding:1px 5px;gap:2px}
.prem-star{display:inline-flex;color:var(--gold);filter:drop-shadow(0 0 5px rgba(255,180,84,.6));flex-shrink:0}
/* цвет ника по кастомизации */
.nick-grad{background:var(--grad-prem);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
/* ── РАМКИ АВАТАРА (накладка) — прокачанные ── */
.av-frame{position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:2}
.frame-none{}
/* двойное неоновое кольцо */
.frame-cyan{box-shadow:inset 0 0 0 2.5px var(--cy),inset 0 0 0 4px rgba(0,0,0,.4),0 0 16px rgba(54,226,208,.7),0 0 4px rgba(54,226,208,.9)}
.frame-pink{box-shadow:inset 0 0 0 2.5px var(--pk),inset 0 0 0 4px rgba(0,0,0,.4),0 0 16px rgba(255,61,127,.7),0 0 4px rgba(255,61,127,.9)}
.frame-purple{box-shadow:inset 0 0 0 2.5px var(--acc),inset 0 0 0 4px rgba(0,0,0,.4),0 0 16px rgba(124,108,255,.7),0 0 4px rgba(124,108,255,.9)}
/* пульсирующее золото */
.frame-gold{box-shadow:inset 0 0 0 2.5px var(--gold),0 0 20px rgba(255,180,84,.8),0 0 6px rgba(255,212,107,1);animation:framePulse 2.2s ease-in-out infinite}
@keyframes framePulse{0%,100%{box-shadow:inset 0 0 0 2.5px var(--gold),0 0 16px rgba(255,180,84,.6),0 0 4px rgba(255,212,107,.8)}50%{box-shadow:inset 0 0 0 2.5px #FFE49B,0 0 28px rgba(255,180,84,1),0 0 10px rgba(255,212,107,1)}}
/* вращающаяся радуга-градиент */
.frame-rainbow{box-shadow:0 0 18px rgba(255,61,127,.55),0 0 18px rgba(54,226,208,.35)}
.frame-rainbow::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:3px;background:conic-gradient(from 0deg,#FF3D7F,#FFD66B,#36E2D0,#6CA8FF,#7C6CFF,#FF3D7F);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:spin 3.5s linear infinite}
/* огонь — быстрый вращ. градиент + жар */
.frame-fire{box-shadow:0 0 22px rgba(255,90,40,.7),0 0 8px rgba(255,61,127,.6)}
.frame-fire::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:3px;background:conic-gradient(from 0deg,#FFD66B,#FF9D5C,#FF3D2F,#FF3D7F,#FF9D5C,#FFD66B);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:spin 2s linear infinite}
/* НОВЫЕ */
/* неон — двойной градиентный контур пинк→циан */
.frame-neon{box-shadow:0 0 22px rgba(54,226,208,.6),0 0 22px rgba(255,61,127,.5)}
.frame-neon::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:3px;background:linear-gradient(135deg,#36E2D0,#7C6CFF 50%,#FF3D7F);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.frame-neon::after{content:'';position:absolute;inset:-4px;border-radius:inherit;border:1px solid rgba(54,226,208,.4);animation:framePulse 1.8s ease-in-out infinite}
/* лёд — мерцающий голубой */
.frame-ice{box-shadow:inset 0 0 0 2.5px #Bfeaff,0 0 18px rgba(140,200,255,.8),inset 0 0 10px rgba(180,230,255,.5)}
.frame-ice::before{content:'';position:absolute;inset:-3px;border-radius:inherit;border:1.5px dashed rgba(190,235,255,.6);animation:spin 12s linear infinite}
/* токсик — кислотный зелёный пульс */
.frame-toxic{box-shadow:inset 0 0 0 2.5px #7CFF4F,0 0 20px rgba(124,255,79,.7),0 0 6px rgba(124,255,79,.9);animation:framePulse 1.6s ease-in-out infinite}
/* глитч — дёргающийся контур */
.frame-glitch{box-shadow:inset 0 0 0 2px #FF3D7F,2px 0 0 #36E2D0,-2px 0 0 #FF3D7F;animation:glitchFrame .9s steps(2) infinite}
@keyframes glitchFrame{0%{box-shadow:inset 0 0 0 2px #FF3D7F,2px 0 0 #36E2D0,-2px 0 0 #FF3D7F}25%{box-shadow:inset 0 0 0 2px #36E2D0,-2px 1px 0 #FF3D7F,2px -1px 0 #36E2D0}50%{box-shadow:inset 0 0 0 2px #7C6CFF,2px 0 0 #FF3D7F,-2px 0 0 #36E2D0}75%{box-shadow:inset 0 0 0 2px #FF3D7F,-2px -1px 0 #36E2D0,2px 1px 0 #FF3D7F}100%{box-shadow:inset 0 0 0 2px #FF3D7F,2px 0 0 #36E2D0,-2px 0 0 #FF3D7F}}

/* ── ФОН КАРТОЧКИ ПРОФИЛЯ — заметный ── */
